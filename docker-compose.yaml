services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    restart: always
    environment:
      MINIO_ROOT_USER: loki
      MINIO_ROOT_PASSWORD: ++loki++
    command: server /data --address ":9100" --console-address ":9001"
    ports:
      - "9100:9100"
      - "9001:9001"
    volumes:
      - ./minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9100/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  bucket:
    image: minio/mc:latest
    container_name: bucket
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        mc alias set minio http://minio:9100 loki ++loki++ &&
        mc mb minio/loki-data || true &&
        mc mb minio/loki-ruler || true &&
        exit 0
      "

  loki:
    image: grafana/loki:3.5.5
    container_name: loki
    restart: always
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./config/loki/loki.yaml:/etc/loki/loki.yaml
    depends_on:
      - minio
      - bucket
    ports:
      - "3101:3101"
      - "7946:7946"
      - "9095:9095"

  tempo:
    image: grafana/tempo:2.8.2
    container_name: tempo
    restart: always
    command: ["-config.file=/etc/tempo.yaml"]
    expose:
      - "3201"
      - "4317"
      - "4318"
    volumes:
      - ./config/tempo/tempo.yaml:/etc/tempo.yaml

  mimir:
    image: grafana/mimir:latest
    container_name: mimir
    restart: always
    ports:
      - "9008:9008"
      - "9009:9009"
    command: ["-config.file=/etc/mimir.yaml"]
    volumes:
      - ./config/mimir/mimir.yaml:/etc/mimir.yaml

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    ports:
      - "9090:9090"
    command:
      - "--web.enable-remote-write-receiver"
      - "--config.file=/etc/prometheus/prometheus.yaml"
    volumes:
      - ./config/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml

  grafana:
    image: grafana/grafana:12.1.1
    container_name: grafana
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - ./config/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_FORM_LOGIN: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    depends_on:
      - loki
      - prometheus
      - tempo
      - mimir

  otel:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel
    restart: always
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
      - "8889:8889"
      - "1888:1888"
      - "13133:13133"
      - "55679:55679"
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./config/otel/otel.yaml:/etc/otelcol/config.yaml
    depends_on:
      - loki
      - tempo
      - prometheus
      - mimir
      - grafana
volumes:
  minio-data:
