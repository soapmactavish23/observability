services:
  loki:
    image: grafana/loki:3.5.5
    container_name: loki
    restart: always
    command: ["-config.file=/etc/loki/loki.yaml", "-config.expand-env=true"]
    volumes:
      - ./config/loki/loki.yaml:/etc/loki/loki.yaml
    depends_on:
      - minio
    ports:
      - 3100:3100
      - 7946
      - 9095

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: minio
    restart: always
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /data/loki-data && \
        mkdir -p /data/loki-ruler && \
        minio server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: loki
      MINIO_ROOT_PASSWORD: ++loki++
    command: server /data --address ":9000" --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 3

  bucket:
    image: minio/mc:latest
    container_name: bucket
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        /usr/bin/mc alias set minio http://minio:9000 loki ++loki++
        /usr/bin/mc rm -r --force minio/loki;
        /usr/bin/mc mb minio/loki;
        /usr/bin/mc anonymous set public minio/loki;
        exit 0;
      "

  tempo:
    image: grafana/tempo:2.8.2
    container_name: tempo
    restart: always
    command: ["-config.file=/etc/tempo.yaml"]
    expose:
      - 3200
      - 4317
      - 4318
    volumes:
      - ./config/tempo/tempo.yaml:/etc/tempo.yaml

  mimir:
    image: grafana/mimir:latest
    container_name: mimir
    restart: always
    ports:
      - 9008:9008
      - 9009:9009
    command: ["-config.file=/etc/mimir.yaml"]
    volumes:
      - ./config/mimir/mimir.yaml:/etc/mimir.yaml

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    ports:
      - 9090:9090
    command:
      [
        "--web.enable-remote-write-receiver",
        "--config.file=/etc/prometheus/prometheus.yaml",
      ]
    volumes:
      - ./config/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml

  grafana:
    image: grafana/grafana:12.1.1
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./config/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_FORM_LOGIN=true
      - GF_SECURITY_ALLOW_EMBEDDING=true
    depends_on:
      - loki
      - prometheus
      - tempo
      - mimir

  otel:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel
    restart: always
    ports:
      - 4317:4317 # gRPC
      - 4318:4318 # http
      - 8888:8888 # prometheus-collector
      - 8889:8889 # prometheus-exporter
      - 1888:1888 # pprof
      - 13133:13133 # health check
      - 55679:55679 # zpages
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./config/otel/otel.yaml:/etc/otelcol/config.yaml
    depends_on:
      - loki
      - tempo
      - prometheus
      - mimir
      - grafana

  promtail:
    image: grafana/promtail:3.5.5
    container_name: promtail
    restart: always
    volumes:
      - ./config/promtail/config.yaml:/etc/promtail/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: ["-config.file=/etc/promtail/config.yaml"]
    depends_on:
      - loki

volumes:
  minio-data:
