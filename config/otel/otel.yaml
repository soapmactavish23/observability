receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_max_size: 100
    send_batch_size: 10
    timeout: 10s

  resource:
    attributes:
      - action: insert
        key: loki.resource.labels
        value: service.name,service.namespace,deployment.environment,service.version

exporters:
  debug:
    verbosity: detailed

  otlp_http/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  otlp_grpc/traces:
    endpoint: tempo:4317
    tls:
      insecure: true

  prometheusremotewrite/metrics:
    endpoint: http://mimir:9009/api/v1/push
    tls:
      insecure: true

extensions:
  health_check:
  pprof:
  zpages:

service:
  extensions: [health_check, pprof, zpages]
  pipelines:
    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [debug, otlp_http/loki]

    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [debug, otlp_grpc/traces]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, prometheusremotewrite/metrics]
