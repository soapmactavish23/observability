receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  prometheus:
    config:
      scrape_configs:
        - job_name: "otel-collector"
          scrape_interval: 10s
          static_configs:
            - targets: ["localhost:8888"]

processors:
  batch:
    send_batch_max_size: 100
    send_batch_size: 10
    timeout: 10s
  resource:
    attributes:
      - action: insert
        key: loki.resource.labels
        value: service.name,service.namespace,deployment.environment,service.version

exporters:
  debug:
    verbosity: detailed

  otlp_http/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  otlp_grpc/traces:
    endpoint: tempo:4317
    tls:
      insecure: true

  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      enabled: true
  otlphttp/metrics:
    endpoint: http://mimir:9009/otlp/v1/metrics
    tls:
      insecure: true
  prometheusremotewrite/metrics:
    endpoint: http://mimir:9090/api/v1/push
    tls:
      insecure: true

extensions:
  health_check:
  pprof:
  zpages:

service:
  extensions: [health_check, pprof, zpages]
  pipelines:
    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [debug, otlp_http/loki]

    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [debug, otlp_grpc/traces]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, prometheusremotewrite/metrics, prometheus]
