global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: prometheus
    honor_labels: false
    static_configs:
      - targets: ["localhost:9090"]
  - job_name: otel-collector
    honor_labels: true
    metrics_path: /metrics
    static_configs:
      - targets: ["otel:8889"]
  - job_name: venomous-api
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]
