apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3101
    isDefault: false
    editable: false
    version: 1
    uid: loki

  - name: Tempo
    type: tempo
    access: proxy
    url: http://tempo:3201
    isDefault: true
    editable: false
    version: 1
    uid: tempo

  - name: Mimir
    type: prometheus
    access: proxy
    url: http://mimir:9009/prometheus
    basicAuth: false
    isDefault: false
    editable: false
    version: 1
    uid: mimir

  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    basicAuth: false
    isDefault: false
    editable: false
    version: 1
    uid: prometheus
